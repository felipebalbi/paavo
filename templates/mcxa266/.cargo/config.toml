[build]
target = "thumbv8m.main-none-eabihf"

[env]
# defmt's log-level filter is COMPILE-TIME, controlled by this env var
# read at build time by the defmt proc-macros. Without it, defmt
# defaults to filtering everything below ERROR for release builds —
# which strips `info!("Test OK")` and `info!("hello from ...")` from
# the ELF entirely. paavo's pass-detection contract requires the
# info-level `Test OK` frame to be present and decodable, so the
# minimum needed level is "info". We use "trace" so user `debug!` /
# `trace!` calls also flow through during development.
#
# Symptom if missing: paavod's defmt-decoder reports "malformed
# frame skipped" warnings because the RTT byte stream contains
# panic-probe's error-level frames (which DO compile in) but no
# info-level frames matching the test's pass contract, and the
# decoder's symbol table is empty for the missing strings.
#
# See https://defmt.ferrous-systems.com/filtering for the full
# filter syntax (e.g. "info,nxp_pac=warn" to silence noisy crates).
DEFMT_LOG = "trace"

[target.thumbv8m.main-none-eabihf]
# `cargo run --release` flashes the ELF onto the attached MCX-A266 EVK
# via probe-rs and streams defmt frames to the terminal. The chip name
# must be `MCXA276` — NOT MCXA266 or MCXA256. probe-rs's NXP support
# advertises the MCX-A2xx family under that name regardless of the
# specific SKU silkscreen; using anything else fails with "chip not
# found in built-in target list". Confirmed against MCU-Link
# CMSIS-DAP V3.172 (VID 0x1fc9, PID 0x0143) on the FRDM-MCXA266 EVK
# during the M7.0 spike; see dev/probe-rs-spike/FINDINGS.md.
#
# `--catch-reset` halts the core at the reset vector before running so
# RTT comes up cleanly, mirroring what paavod does. Drop it if you'd
# rather see boot-time defmt frames at the cost of occasionally
# missing the first frame.
#
# This runner makes `cargo run --release` the local-validation
# equivalent of `paavo-cli run --follow .`: the scaffold runs against
# the same hardware, with the same ELF, without paavod in the path.
# Useful for isolating "is this paavo's bug or my code's bug" during
# debugging.
runner = "probe-rs run --chip MCXA276 --catch-reset"
rustflags = [
  # NOTE: -Tlink_ram.x is emitted by build.rs (cargo:rustc-link-arg),
  # NOT here. paavo tests run from RAM (teleprobe convention); link_ram.x
  # is mutually exclusive with cortex-m-rt's flash-resident `link.x`,
  # so don't pass `-Tlink.x` here — both would `INCLUDE memory.x` and
  # produce duplicate-region errors.
  "-C", "link-arg=-Tdefmt.x",      # defmt's relocation section
  # --nmagic disables page alignment of sections. cortex-m-rt's link
  # scripts assume the RAM origin is 0x10000-aligned; without --nmagic
  # the linker may produce broken outputs when sections aren't aligned.
  # See https://github.com/rust-embedded/cortex-m-quickstart/pull/95
  "-C", "link-arg=--nmagic",
]

# Cargo's libgit2 backend on Windows can fail to clone public Github
# repos when the user has a git credential-helper configured (it tries
# to auth even though the repo is anonymous-accessible, then errors out
# instead of falling through to anonymous). Telling cargo to shell out
# to `git` for fetches sidesteps the issue and works the same on Linux.
# See https://doc.rust-lang.org/cargo/reference/config.html#netgit-fetch-with-cli
[net]
git-fetch-with-cli = true
