[build]
target = "thumbv8m.main-none-eabihf"

[target.thumbv8m.main-none-eabihf]
rustflags = [
  # NOTE: -Tlink_ram.x is emitted by build.rs (cargo:rustc-link-arg),
  # NOT here. paavo tests run from RAM (teleprobe convention); link_ram.x
  # is mutually exclusive with cortex-m-rt's flash-resident `link.x`,
  # so don't pass `-Tlink.x` here — both would `INCLUDE memory.x` and
  # produce duplicate-region errors.
  "-C", "link-arg=-Tdefmt.x",      # defmt's relocation section
  # --nmagic disables page alignment of sections. cortex-m-rt's link
  # scripts assume the RAM origin is 0x10000-aligned; without --nmagic
  # the linker may produce broken outputs when sections aren't aligned.
  # See https://github.com/rust-embedded/cortex-m-quickstart/pull/95
  "-C", "link-arg=--nmagic",
]

# Cargo's libgit2 backend on Windows can fail to clone public Github
# repos when the user has a git credential-helper configured (it tries
# to auth even though the repo is anonymous-accessible, then errors out
# instead of falling through to anonymous). Telling cargo to shell out
# to `git` for fetches sidesteps the issue and works the same on Linux.
# See https://doc.rust-lang.org/cargo/reference/config.html#netgit-fetch-with-cli
[net]
git-fetch-with-cli = true
